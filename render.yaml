services:
  - type: web
    name: homaiker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn frontend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FAL_KEY
        sync: false
      - key: LORA_URL
        sync: false
      - key: DEFAULT_PROMPT
        sync: false
